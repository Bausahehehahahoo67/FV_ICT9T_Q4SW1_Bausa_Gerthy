<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.deez{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}


#form-box{
    background: rgba(20, 20, 20, 0.85); 
    padding:30px;
    border-radius:10px;
    border: 1px solid rgba(255,120,0,0.5); 
    box-shadow:0 0 15px rgba(255,100,0,0.6);
    width:300px;
}


#form-box input{
    margin-bottom:10px;
}

body{
    background-image: url(https://i.imgur.com/yChvSJb.gif);
    background-size: cover;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="deez" id="deez">
  <h1 class="mb-4 text-white">Temperature Checker</h1>

  <button class="btn btn-light mb-3" data-bs-toggle="collapse" data-bs-target="#instructions">Show Instructions</button>

  <div class="collapse mb-3" id="instructions">
      <div class="card card-body">
         <p>Please enter the temperature and the relative humidity in each box, then click the "check temperature" button to calculate.</p>
      </div>
  </div>

  <div id="form-box">
    <input type="text" class="form-control" id="Temperature" placeholder="Enter your Temp in °C">
    <input type="text" class="form-control" id="Humidity" placeholder="Enter your %RH">
    <button class="btn btn-info w-100 mt-2" onclick="checkTemperature()">Check Temperature</button>
  </div>
</div>

<script>
function checkTemperature(){

var temperature = parseFloat(document.getElementById("Temperature").value);
var humidity = parseFloat(document.getElementById("Humidity").value);

if(isNaN(temperature)){
   alert("Please enter a valid temperature.");
   return;
}

if(isNaN(humidity)){
   alert("Please enter a valid humidity.");
   return;
}

var HeatIndex = temperature + (0.33 * humidity) - 4;

if(temperature <= 27){
   alert("You are in the cool zone!");
}
else if(temperature <= 32){
   alert("You are in the warm zone!");
}
else if(temperature <= 37){
   alert("You are in the hot zone!");
}
else if(temperature <= 41){
   alert("You are in the caution zone!");
}
else{
   alert("You are in the danger zone!");
}

alert("Heat Index: " + HeatIndex.toFixed(1));

}
</script>

</body>
</html>
