<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.deez{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}


#form-box{
    background: rgba(20, 20, 20, 0.85); 
    padding:30px;
    border-radius:10px;
    border: 1px solid rgba(255,120,0,0.5); 
    box-shadow:0 0 15px rgba(255,100,0,0.6);
    width:300px;
}


#form-box input{
    margin-bottom:10px;
}

body{
    background-image: url(file:///C:/Users/GERTHY%20BAUSA/Downloads/5.gif);
    background-size: cover;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="deez" id="deez">
  <h1 class="mb-4 text-white">Login to Account</h1>

  <button class="btn btn-light mb-3" data-bs-toggle="collapse" data-bs-target="#instructions">Show Instructions</button>

  <div class="collapse mb-3" id="instructions">
      <div class="card card-body">
         <p>Please enter your username and password to log in.</p>
      </div>
  </div>

  <div id="form-box">
    <input type="text" class="form-control" id="Username" placeholder="Enter your username">
    <input type="password" class="form-control" id="Password" placeholder="Enter your password">
    <button class="btn btn-info w-100 mt-2" onclick="checkLogin()">Login</button>
  </div>
</div>

<script>
function checkLogin(){
    var username = document.getElementById("Username").value;
    var password = document.getElementById("Password").value;

    if(username === "admin" && password === "password"){
        alert("Login successful!");
    } else {
        alert("Invalid username or password.");
    }
}
</script>

</body>
</html>
